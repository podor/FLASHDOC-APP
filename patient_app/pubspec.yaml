name: patient_app
description: FlashDoc — Application patient et médecin
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Navigation ──────────────────────────────────────────────────
  go_router: ^13.2.0

  # ── State management ────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── HTTP & API ───────────────────────────────────────────────────
  dio: ^5.4.1
  pretty_dio_logger: ^1.3.1

  # ── Stockage local ────────────────────────────────────────────────
  shared_preferences: ^2.2.2

  # ── Socket.io ────────────────────────────────────────────────────
  socket_io_client: ^2.0.3+1

  # ── Icons iOS (supprime le warning cupertino_icons) ───────────────
  cupertino_icons: ^1.0.8

  # ── UI & Design ──────────────────────────────────────────────────
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  pin_code_fields: ^8.0.1
  flutter_rating_bar: ^4.0.1
  table_calendar: ^3.1.1

  # ── Photo de profil (image_cropper retiré — incompatible AGP) ────
  image_picker: ^1.0.7

  # ── Ordonnances & QR code ────────────────────────────────────────
  qr_flutter: ^4.1.0
  path_provider: ^2.1.3
  open_file: ^3.3.2
  permission_handler: ^11.3.1

  # ── Utilitaires ──────────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.2.5
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_flashdoc.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_flashdoc.png"
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
