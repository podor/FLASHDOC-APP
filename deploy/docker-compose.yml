version: '3.8'

# ═══════════════════════════════════════════════════════════════
# FlashDoc — Docker Compose Production
# Réseau isolé : flashdoc_network (n'interfère pas avec les autres apps)
# ─────────────────────────────────────────────────────────────
# Ports exposés sur le host :
#   5003  → backend API + Socket.io
#   5084  → pgAdmin 4  (PostgreSQL UI) — accès local uniquement
#   5085  → RedisInsight (Redis UI)    — accès local uniquement
# ═══════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL dédié FlashDoc ─────────────────────────────────
  flashdoc_postgres:
    image: postgres:15-alpine
    container_name: flashdoc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - flashdoc_postgres_data:/var/lib/postgresql/data
    networks:
      - flashdoc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  flashdoc_redis:
    image: redis:7-alpine
    container_name: flashdoc_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - flashdoc_redis_data:/data
    networks:
      - flashdoc_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Backend Node.js FlashDoc ──────────────────────────────────
  flashdoc_backend:
    image: flashdoc_backend:latest
    container_name: flashdoc_backend
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:5003:3000"
    environment:
      NODE_ENV:                 production
      PORT:                     3000
      DATABASE_URL:             postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@flashdoc_postgres:5432/${POSTGRES_DB}
      JWT_SECRET:               ${JWT_SECRET}
      JWT_EXPIRES_IN:           ${JWT_EXPIRES_IN}
      REFRESH_TOKEN_SECRET:     ${REFRESH_TOKEN_SECRET}
      REDIS_URL:                redis://:${REDIS_PASSWORD}@flashdoc_redis:6379
      PLATFORM_COMMISSION_RATE: ${PLATFORM_COMMISSION_RATE}
      DISPATCH_TIMEOUT_SECONDS: ${DISPATCH_TIMEOUT_SECONDS}
      ALLOWED_ORIGINS:          ${ALLOWED_ORIGINS}
      BASE_URL:                 ${BASE_URL}
      UPLOAD_PATH:              /app/uploads/avatars
    volumes:
      - flashdoc_uploads:/app/uploads
    networks:
      - flashdoc_network
    depends_on:
      flashdoc_postgres:
        condition: service_healthy
      flashdoc_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  # ── pgAdmin 4 — Interface web PostgreSQL ──────────────────────
  # Accès : http://localhost:5084 (ou via Nginx : https://pgadmin.flashdoc.tchoukheadcorp.net)
  flashdoc_pgadmin:
    image: dpage/pgadmin4:latest
    container_name: flashdoc_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      # Désactiver le mode master password pour simplifier
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      # Exposé uniquement sur localhost — Nginx proxyfie vers l'extérieur avec SSL
      - "127.0.0.1:5084:80"
    volumes:
      - flashdoc_pgadmin_data:/var/lib/pgadmin
      # Connexion auto-configurée vers flashdoc_postgres au démarrage
      - ./config/pgadmin-servers.json:/pgadmin4/servers.json:ro
    networks:
      - flashdoc_network
    depends_on:
      flashdoc_postgres:
        condition: service_healthy

  # ── RedisInsight — Interface web Redis ────────────────────────
  # Accès : http://localhost:5085 (ou via Nginx : https://redis.flashdoc.tchoukheadcorp.net)
  flashdoc_redisinsight:
    image: redis/redisinsight:latest
    container_name: flashdoc_redisinsight
    restart: unless-stopped
    ports:
      # Exposé uniquement sur localhost — Nginx proxyfie vers l'extérieur avec SSL
      - "127.0.0.1:5085:5540"
    volumes:
      - flashdoc_redisinsight_data:/data
    networks:
      - flashdoc_network
    depends_on:
      flashdoc_redis:
        condition: service_healthy

# ── Volumes ────────────────────────────────────────────────────
volumes:
  flashdoc_postgres_data:
    name: flashdoc_postgres_data
  flashdoc_redis_data:
    name: flashdoc_redis_data
  flashdoc_uploads:
    name: flashdoc_uploads
  flashdoc_pgadmin_data:
    name: flashdoc_pgadmin_data
  flashdoc_redisinsight_data:
    name: flashdoc_redisinsight_data

# ── Réseau isolé ───────────────────────────────────────────────
networks:
  flashdoc_network:
    name: flashdoc_network
    driver: bridge
