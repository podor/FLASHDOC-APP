# ═══════════════════════════════════════════════════════════════
# FlashDoc — Configuration Nginx complète
# Fichier : /etc/nginx/sites-available/flashdoc
#
# Sous-domaines gérés :
#   api.flashdoc.tchoukheadcorp.net     → Backend API + Socket.io (port 5003)
#   pgadmin.flashdoc.tchoukheadcorp.net → pgAdmin 4 PostgreSQL    (port 5084)
#   redis.flashdoc.tchoukheadcorp.net   → RedisInsight             (port 5085)
#
# Après création : sudo certbot --nginx -d api.flashdoc.tchoukheadcorp.net
#                                       -d pgadmin.flashdoc.tchoukheadcorp.net
#                                       -d redis.flashdoc.tchoukheadcorp.net
# ═══════════════════════════════════════════════════════════════

# ══════════════════════════════════════════════════════════════
# 1. API FlashDoc — api.flashdoc.tchoukheadcorp.net
# ══════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name api.flashdoc.tchoukheadcorp.net;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.flashdoc.tchoukheadcorp.net;

    ssl_certificate     /etc/letsencrypt/live/api.flashdoc.tchoukheadcorp.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.flashdoc.tchoukheadcorp.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL_FD:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 10M;

    access_log /var/log/nginx/flashdoc_api.access.log;
    error_log  /var/log/nginx/flashdoc_api.error.log;

    # REST API
    location /api/ {
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # Socket.io WebSocket — crucial pour les consultations temps réel
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Long timeout pour les connexions WebSocket persistantes
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Avatars & uploads
    location /uploads/ {
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    location /api/health {
        proxy_pass http://127.0.0.1:5003;
        access_log off;
    }
}

# ══════════════════════════════════════════════════════════════
# 2. pgAdmin 4 — pgadmin.flashdoc.tchoukheadcorp.net
# ══════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name pgadmin.flashdoc.tchoukheadcorp.net;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name pgadmin.flashdoc.tchoukheadcorp.net;

    ssl_certificate     /etc/letsencrypt/live/pgadmin.flashdoc.tchoukheadcorp.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pgadmin.flashdoc.tchoukheadcorp.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL_PGA:10m;

    access_log /var/log/nginx/flashdoc_pgadmin.access.log;
    error_log  /var/log/nginx/flashdoc_pgadmin.error.log;

    # Augmenter la taille pour les imports SQL
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:5084;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name     /;
        proxy_redirect off;

        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}

