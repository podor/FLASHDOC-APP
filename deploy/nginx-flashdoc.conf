# ═══════════════════════════════════════════════════════════════
# FlashDoc — Configuration Nginx complète
# Certificats :
#   api.flashdoc...     → live/api.flashdoc.tchoukheadcorp.net/
#   pgadmin + redis     → live/pgadmin.flashdoc.tchoukheadcorp.net/
#   admin               → live/admin.flashdoc.tchoukheadcorp.net/
# ═══════════════════════════════════════════════════════════════

# ── HTTP → HTTPS redirections ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.flashdoc.tchoukheadcorp.net
                pgadmin.flashdoc.tchoukheadcorp.net
                redis.flashdoc.tchoukheadcorp.net
                admin.flashdoc.tchoukheadcorp.net;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# ══════════════════════════════════════════════════════════════
# 1. API + Socket.io — port 5003
# ══════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.flashdoc.tchoukheadcorp.net;

    ssl_certificate     /etc/letsencrypt/live/api.flashdoc.tchoukheadcorp.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.flashdoc.tchoukheadcorp.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    client_max_body_size 10M;
    access_log /var/log/nginx/flashdoc_api.access.log;
    error_log  /var/log/nginx/flashdoc_api.error.log;

    location /api/ {
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }
}

# ══════════════════════════════════════════════════════════════
# 2. pgAdmin 4 — port 5084
# ══════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name pgadmin.flashdoc.tchoukheadcorp.net;

    ssl_certificate     /etc/letsencrypt/live/pgadmin.flashdoc.tchoukheadcorp.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pgadmin.flashdoc.tchoukheadcorp.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;
    access_log /var/log/nginx/flashdoc_pgadmin.access.log;
    error_log  /var/log/nginx/flashdoc_pgadmin.error.log;

    location / {
        proxy_pass http://127.0.0.1:5084;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 120s;
        proxy_read_timeout    120s;
    }
}

