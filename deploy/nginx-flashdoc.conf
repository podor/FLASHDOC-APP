# ═══════════════════════════════════════════════════════════════
# FlashDoc — Configuration Nginx
# Fichier à placer sur le VPS :
#   /etc/nginx/sites-available/flashdoc
# Puis activer avec :
#   sudo ln -s /etc/nginx/sites-available/flashdoc /etc/nginx/sites-enabled/flashdoc
#   sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════

# ── Redirection HTTP → HTTPS (API) ────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.flashdoc.tchoukheadcorp.net;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── API Backend FlashDoc (HTTPS) ──────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name api.flashdoc.tchoukheadcorp.net;

    # SSL — sera complété par Certbot
    ssl_certificate     /etc/letsencrypt/live/api.flashdoc.tchoukheadcorp.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.flashdoc.tchoukheadcorp.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_FD:10m;
    ssl_session_timeout 10m;

    # Sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Taille max uploads (photos de profil)
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/flashdoc_api_access.log;
    error_log  /var/log/nginx/flashdoc_api_error.log;

    # ── API REST ─────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts généreux pour les consultations longues
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ── Socket.io (WebSocket) ────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts longs pour les connexions WebSocket persistantes
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Fichiers statiques (avatars uploadés) ────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache 5 minutes pour les images
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # ── Health check ─────────────────────────────────────────
    location /api/health {
        proxy_pass http://127.0.0.1:5003;
        access_log off;
    }
}
